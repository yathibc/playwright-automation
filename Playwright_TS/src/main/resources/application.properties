# Telegram Bot Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.chat.id=${TELEGRAM_CHAT_ID}

# Ticket Website Configuration
website.url=${TICKET_URL:https://www.royalchallengers.com/}
website.timeout=30000
website.navigation.timeout=60000

# Runtime Window (24-hour format)
runtime.start=${RUNTIME_START:11:00}
runtime.end=${RUNTIME_END:12:30}

# Seat Preferences
seats.preferred.stand=${PREFERRED_STAND:C Stand}
seats.preferred.row=${PREFERRED_ROW:R}
seats.fallback.stand=${FALLBACK_STAND:B Stand}
seats.min=${PREFERRED_SEAT_MIN:50}
seats.max=${PREFERRED_SEAT_MAX:60}

# Session Configuration
sessions.max.parallel=${MAX_PARALLEL_SESSIONS:5}
sessions.preload.minutes=${SESSION_PRELOAD_MINUTES:15}

# Debug Configuration
debug.enabled=${DEBUG_MODE:false}
debug.screenshot.path=./screenshots
debug.slow.mo=1000

# Match Configuration
match.team1.keywords=RCB,Bangalore,Royal Challengers
match.team2.keywords=SRH,Hyderabad,Sunrisers
match.booking.button.labels=Book Now,Buy Tickets,Tickets,Select Seats

# Planned future payment configuration
payment.method=${PAYMENT_METHOD:NAVI_UPI}
payment.upi.id=${UPI_ID:7899179393@naviaxis}

# Logging Configuration
logging.level.root=INFO
logging.level.com.ticketautomation=DEBUG
logging.file.path=./logs/automation.log
logging.file.max.size=10MB
logging.file.max.history=5
